# =============================================================================
# Smoke test: diversity AL, no propagation, one acquisition round, tiny pool/epochs.
# Verifies pipeline before using configs/al_aws_diversity_dispef_m.yaml (full scale).
#
# Run (no propagation): ./scripts/run_al_diversity_aws_smoke.sh
# Run (with propagation): ./scripts/run_al_diversity_aws_smoke_prop.sh
# =============================================================================

paths:
  project_root: /opt/dlami/nvme/esm3_gnn_distill_baseline
  raw_dispef_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/data/raw/dispef
  processed_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/data/processed
  teacher_cache_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/cache/teacher
  outputs_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/outputs
  checkpoints_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/checkpoints
  logs_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/logs

data:
  dataset_name: dispef_m
  cache_graphs: false
  splits_file: null

graph:
  cutoff: 0.001
  max_neighbors: 0

model:
  name: schake
  hidden_channels: 32
  num_layers: 2
  kernel_size: 18
  sake_low_cut: 0.25
  sake_high_cut: 1.0
  schnet_low_cut: 1.0
  schnet_high_cut: 2.5
  max_num_neigh: 10000
  num_heads: 4
  num_out_layers: 3
  mc_dropout_p: 0.1

train:
  seed: 42
  device: auto
  epochs: 3
  batch_size: 32
  num_workers: 4
  mixed_precision: true
  multi_gpu: false

  lr: 1.5e-3
  weight_decay: 1.0e-6
  lr_step_size: 3
  lr_gamma: 0.9

  teacher_loss_type: soft_ce
  distill_temperature: 1.0
  lambda_teacher: 1.0
  lambda_dssp: 1.0
  require_dssp_labels: true

  use_validation: true
  early_stopping_patience: 1
  checkpoint_every: 1
  log_every_steps: 50
  resume_checkpoint: ""

active_learning:
  strategy: diversity
  # Small candidate universe → fast embedding precompute (still O(pool_size) graphs on CPU).
  pool_size: 1000
  initial_train_size: 200
  budget_per_round: 50
  # One acquisition: train rounds 0 and 1; diversity selection after round 0 only.
  num_rounds: 1
  seed: 42

wandb:
  enabled: false
  entity: ""
  project: "pLM_KD"
  name: "aws_al_diversity_smoke"
  notes: ""
  tags: ["aws", "active_learning", "diversity", "smoke", "no_propagation"]

eval:
  batch_size: 16
