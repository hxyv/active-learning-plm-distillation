paths:
  project_root: /ocean/projects/cis250233p/xhu15/active-learning-plm-distillation
  raw_dispef_root: /ocean/projects/cis250233p/xhu15/data/raw/dispef
  processed_root: /ocean/projects/cis250233p/xhu15/data/processed
  teacher_cache_root: /ocean/projects/cis250233p/xhu15/cache/teacher
  outputs_root: /ocean/projects/cis250233p/xhu15/outputs
  checkpoints_root: /ocean/projects/cis250233p/xhu15/checkpoints
  logs_root: /ocean/projects/cis250233p/xhu15/logs

data:
  dataset_name: dispef_m
  cache_graphs: false
  splits_file: null

graph:
  cutoff: 0.001
  max_neighbors: 0

model:
  name: schake
  hidden_channels: 32
  num_layers: 2
  kernel_size: 18
  sake_low_cut: 0.25
  sake_high_cut: 1.0
  schnet_low_cut: 1.0
  schnet_high_cut: 2.5
  max_num_neigh: 10000
  num_heads: 4
  num_out_layers: 3
  mc_dropout_p: 0.1

train:
  seed: 42
  device: auto
  epochs: 120
  # Matched to the team's AWS config (configs/al_aws_dispef_m.yaml, wen branch)
  # for a same-recipe comparison with their EMC / diversity runs.  Default PSC
  # config runs at 150.
  batch_size: 48
  num_workers: 8
  mixed_precision: true
  multi_gpu: false

  lr: 1.5e-3
  weight_decay: 1.0e-6
  lr_step_size: 3
  lr_gamma: 0.9

  teacher_loss_type: soft_ce
  distill_temperature: 1.0
  lambda_teacher: 1.0
  lambda_dssp: 1.0
  require_dssp_labels: true

  use_validation: true
  early_stopping_patience: 20
  checkpoint_every: 10
  log_every_steps: 100
  resume_checkpoint: ""

active_learning:
  strategy: random
  pool_size: 12000
  initial_train_size: 2500
  budget_per_round: 500
  num_rounds: 15
  seed: 42

wandb:
  enabled: true
  entity: ""
  project: "pLM_KD"
  name: "psc_al_bs48"
  notes: ""
  tags: ["psc", "active_learning", "bs48"]

eval:
  batch_size: 24
