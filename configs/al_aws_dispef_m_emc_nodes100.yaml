# =============================================================================
# Same as al_aws_dispef_m.yaml but EMC uses more nodes per graph (slower, less approximate).
#
# Run: python -m active_learning.al_loop --config configs/al_aws_dispef_m_emc_nodes100.yaml ...
# Or:  ./scripts/tmux_run_al_loop_aws_emc_nodes100.sh
# =============================================================================

paths:
  # <<< EDIT — absolute path to this repo on the GPU instance
  project_root: /opt/dlami/nvme/esm3_gnn_distill_baseline
  # <<< EDIT — Zenodo DISPEF raw tensors (only needed for preprocess / reference)
  raw_dispef_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/data/raw/dispef
  # <<< EDIT — must contain <dataset_name>/splits.json and .npz files (see header)
  processed_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/data/processed
  # <<< EDIT — ESM3 / teacher cache from generate_teacher_labels
  teacher_cache_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/cache/teacher
  # <<< EDIT — AL runs, logs, round outputs
  outputs_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/outputs
  checkpoints_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/checkpoints
  logs_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/logs


data:
  dataset_name: dispef_m
  cache_graphs: false
  # splits_file is set at runtime by al_loop.py; leave null here
  splits_file: null

graph:
  cutoff: 0.001
  max_neighbors: 0

model:
  name: schake
  hidden_channels: 32
  num_layers: 2
  kernel_size: 18
  sake_low_cut: 0.25
  sake_high_cut: 1.0
  schnet_low_cut: 1.0
  schnet_high_cut: 2.5
  max_num_neigh: 10000
  num_heads: 4
  num_out_layers: 3
  mc_dropout_p: 0.1

train:
  seed: 42
  device: auto
  epochs: 120
  # 32 was safe on ~22GB; 150 OOM'd. 48 is a middle step — if OOM, set back to 32; if stable, try 64.
  batch_size: 48
  num_workers: 6
  mixed_precision: true
  multi_gpu: false

  lr: 1.5e-3
  weight_decay: 1.0e-6
  lr_step_size: 3
  lr_gamma: 0.9

  teacher_loss_type: soft_ce
  distill_temperature: 1.0
  lambda_teacher: 1.0
  lambda_dssp: 1.0
  require_dssp_labels: true

  use_validation: true
  early_stopping_patience: 20
  checkpoint_every: 10
  log_every_steps: 200
  resume_checkpoint: ""

active_learning:
  # Full-pool, all-node EMC is very slow. Approximate EMC options:
  #   emc_max_pool_graphs — max proteins randomly drawn from the pool to score per round (budget can be smaller).
  #   emc_max_nodes_per_graph — max nodes randomly drawn per graph for the inner EMC sum (sample mean).
  # Or use strategy random / mc_dropout for cheap acquisition.
  strategy: emc
  pool_size: 12000          # first pool_size train IDs from splits.json form the AL candidate universe
  initial_train_size: 2500  # labeled at round 0 (random subset of that universe)
  budget_per_round: 500
  # At most this many pool graphs scored per EMC round; top `budget_per_round` become labels (need budget <= cap).
  emc_max_pool_graphs: 700
  # null = use all nodes per graph. Integer = random node subset; EMC score is mean over sampled nodes only.
  emc_max_nodes_per_graph: 100
  # num_rounds = number of acquisition steps. Training runs for round indices 0..num_rounds (num_rounds+1 fits).
  # Need: pool_size - initial_train_size >= num_rounds * budget_per_round  (else pool empties early).
  num_rounds: 15
  seed: 42

wandb:
  # <<< EDIT — set false if not using Weights & Biases
  enabled: true
  # <<< EDIT — your W&B entity (username or team); empty string may still work if logged in
  entity: ""
  project: "pLM_KD"
  # <<< EDIT optional — run name shown in W&B
  name: "aws_al_emc_nodes100"
  notes: ""
  tags: ["aws", "active_learning", "emc", "emc_nodes100"]

eval:
  batch_size: 24
