paths:
  project_root: /opt/dlami/nvme/esm3_gnn_distill_baseline
  raw_dispef_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/data/raw/dispef
  processed_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/data/processed
  teacher_cache_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/cache/teacher
  outputs_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/outputs
  checkpoints_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/checkpoints
  logs_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/logs

data:
  dataset_name: dispef_m
  cache_graphs: false

graph:
  # Schake computes its own radius graph internally; set cutoff near-zero to skip
  # the unused dataset-level edge building (avoids O(N^2) CPU cost per sample).
  cutoff: 0.001
  max_neighbors: 0

model:
  # Schake v2 architecture.
  name: schake
  hidden_channels: 32
  num_layers: 2
  kernel_size: 18
  sake_low_cut: 0.25
  sake_high_cut: 1.0
  schnet_low_cut: 1.0
  schnet_high_cut: 2.5
  max_num_neigh: 10000
  num_heads: 4
  num_out_layers: 3

train:
  seed: 42
  device: auto
  epochs: 120
  batch_size: 50
  num_workers: 6
  mixed_precision: true
  multi_gpu: false

  lr: 1.0e-3
  weight_decay: 1.0e-6
  lr_step_size: 3
  lr_gamma: 0.9

  teacher_loss_type: soft_ce
  distill_temperature: 1.0
  lambda_teacher: 1.0
  lambda_dssp: 1.0
  require_dssp_labels: true

  # Paper uses official train/test only for DISPEF-M.
  use_validation: false
  early_stopping_patience: 20
  checkpoint_every: 10
  log_every_steps: 100
  resume_checkpoint: ""

wandb:
  enabled: true
  entity: "xingyuhu95-carnegie-mellon-university"
  project: "pLM_KD"
  name: "baseline"
  notes: ""
  tags: ["paper"]

s3_sync:
  enabled: false
  bucket_prefix: "s3://02750s3/active-learning-plm-distillation"
  sync_every_epochs: 1
  upload_last_each_epoch: true
  upload_best: true
  upload_epoch_checkpoints: false
  upload_run_artifacts: true
  fail_on_error: false

eval:
  batch_size: 16
