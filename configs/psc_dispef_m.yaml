paths:
  project_root: /ocean/projects/cis250233p/xhu15/active-learning-plm-distillation
  raw_dispef_root: /ocean/projects/cis250233p/xhu15/data/raw/dispef
  processed_root: /ocean/projects/cis250233p/xhu15/data/processed
  teacher_cache_root: /ocean/projects/cis250233p/xhu15/cache/teacher
  outputs_root: /ocean/projects/cis250233p/xhu15/outputs
  checkpoints_root: /ocean/projects/cis250233p/xhu15/checkpoints
  logs_root: /ocean/projects/cis250233p/xhu15/logs

data:
  dataset_name: dispef_m
  cache_graphs: false

graph:
  # Schake computes its own radius graph internally; set cutoff near-zero to skip
  # the unused dataset-level edge building (avoids O(N^2) CPU cost per sample).
  cutoff: 0.001
  max_neighbors: 0

model:
  name: schake
  hidden_channels: 32
  num_layers: 2
  kernel_size: 18
  sake_low_cut: 0.25
  sake_high_cut: 1.0
  schnet_low_cut: 1.0
  schnet_high_cut: 2.5
  max_num_neigh: 10000
  num_heads: 4
  num_out_layers: 3

train:
  seed: 42
  device: auto
  epochs: 120
  batch_size: 150
  num_workers: 8
  mixed_precision: true
  multi_gpu: false

  lr: 1.5e-3
  weight_decay: 1.0e-6
  lr_step_size: 3
  lr_gamma: 0.9

  teacher_loss_type: soft_ce
  distill_temperature: 1.0
  lambda_teacher: 1.0
  lambda_dssp: 1.0
  require_dssp_labels: true

  use_validation: true
  early_stopping_patience: 20
  checkpoint_every: 10
  log_every_steps: 100
  resume_checkpoint: ""

wandb:
  enabled: true
  entity: ""
  project: "pLM_KD"
  name: "psc_baseline"
  notes: ""
  tags: ["psc"]

eval:
  batch_size: 48
