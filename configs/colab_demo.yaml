paths:
  project_root: /content/dispef_ws
  raw_dispef_root: /content/dispef_ws/data/raw/dispef
  processed_root: /content/dispef_ws/data/processed
  teacher_cache_root: /content/dispef_ws/cache/teacher
  outputs_root: /content/dispef_ws/outputs
  checkpoints_root: /content/dispef_ws/checkpoints
  logs_root: /content/dispef_ws/logs

data:
  dataset_name: dispef_m
  cache_graphs: false

graph:
  # Schake v2 computes its own radius graph internally; near-zero cutoff skips
  # the dataset-level edge building (avoids O(N^2) CPU cost per sample).
  cutoff: 0.001
  max_neighbors: 0

model:
  name: schake
  hidden_channels: 32
  num_layers: 2
  kernel_size: 18
  sake_low_cut: 0.25    # nm — short-range SAKE branch (all-atom, intra-residue)
  sake_high_cut: 1.0
  schnet_low_cut: 1.0   # nm — long-range SchNet branch (CA-only)
  schnet_high_cut: 2.5
  max_num_neigh: 10000
  num_heads: 4
  num_out_layers: 3

train:
  seed: 42
  device: auto            # auto-detects CUDA or falls back to CPU
  epochs: 10              # small for quick Colab exploration; set to 120 to match paper
  batch_size: 32
  num_workers: 2          # Colab has fewer CPU workers than AWS
  mixed_precision: true   # uses AMP on CUDA; no-op on CPU
  multi_gpu: false

  lr: 1.0e-3
  weight_decay: 1.0e-6
  lr_step_size: 3
  lr_gamma: 0.9

  teacher_loss_type: soft_ce
  distill_temperature: 1.0
  lambda_teacher: 1.0     # weight on soft-label (teacher) cross-entropy
  lambda_dssp: 1.0        # weight on hard DSSP auxiliary cross-entropy
  require_dssp_labels: true

  use_validation: true
  early_stopping_patience: 5
  checkpoint_every: 5
  log_every_steps: 20
  resume_checkpoint: ""

wandb:
  enabled: false          # set to true and fill entity if you want W&B tracking
  entity: ""
  project: "pLM_KD"
  name: "colab_demo"
  notes: "Colab demo run"
  tags: ["colab", "demo"]

s3_sync:
  enabled: false          # no S3 on Colab
  bucket_prefix: ""
  sync_every_epochs: 10
  upload_last_each_epoch: false
  upload_best: false
  upload_epoch_checkpoints: false
  upload_run_artifacts: false
  fail_on_error: false

eval:
  batch_size: 16
