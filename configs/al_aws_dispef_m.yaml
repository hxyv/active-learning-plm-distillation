# =============================================================================
# TO DO — fill in / verify before running (mark done in your editor as you go)
#
#   [ ] paths.project_root          — absolute path to this git repo on the instance
#   [ ] paths.raw_dispef_root       — raw DISPEF tensors (preprocess only; ok if empty until needed)
#   [ ] paths.processed_root        — parent of dispef_m/ (must hold dispef_m/splits.json + npz)
#   [ ] paths.teacher_cache_root    — ESM3 teacher outputs (generate_teacher_labels or S3 sync)
#   [ ] paths.outputs_root          — AL + run outputs
#   [ ] paths.checkpoints_root      — saved model checkpoints
#   [ ] paths.logs_root             — training / slurm-style logs if used
#   [ ] wandb.enabled               — false if not using Weights & Biases
#   [ ] wandb.entity                — your W&B username or team (if enabled)
#   [ ] wandb.name / tags           — optional labels for the run
#   [ ] train.num_workers           — optional: lower on small CPUs if DataLoader struggles
#
# processed_root hint: if S3 layout is .../data_processed/data_processed/dispef_m/,
#   set processed_root to .../data_processed/data_processed (not .../data_processed).
#
# Run: python -m active_learning.al_loop --config configs/al_aws_dispef_m.yaml ...
# =============================================================================

paths:
  # <<< EDIT — absolute path to this repo on the GPU instance
  project_root: /opt/dlami/nvme/esm3_gnn_distill_baseline
  # <<< EDIT — Zenodo DISPEF raw tensors (only needed for preprocess / reference)
  raw_dispef_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/data/raw/dispef
  # <<< EDIT — must contain <dataset_name>/splits.json and .npz files (see header)
  processed_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/data/processed
  # <<< EDIT — ESM3 / teacher cache from generate_teacher_labels
  teacher_cache_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/cache/teacher
  # <<< EDIT — AL runs, logs, round outputs
  outputs_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/outputs
  checkpoints_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/checkpoints
  logs_root: /opt/dlami/nvme/esm3_gnn_distill_baseline/logs


data:
  dataset_name: dispef_m
  cache_graphs: false
  # splits_file is set at runtime by al_loop.py; leave null here
  splits_file: null

graph:
  cutoff: 0.001
  max_neighbors: 0

model:
  name: schake
  hidden_channels: 32
  num_layers: 2
  kernel_size: 18
  sake_low_cut: 0.25
  sake_high_cut: 1.0
  schnet_low_cut: 1.0
  schnet_high_cut: 2.5
  max_num_neigh: 10000
  num_heads: 4
  num_out_layers: 3
  mc_dropout_p: 0.1

train:
  seed: 42
  device: auto
  epochs: 120
  batch_size: 150
  # <<< EDIT optional — lower if DataLoader workers starve CPU on small instances
  num_workers: 8
  mixed_precision: true
  multi_gpu: false

  lr: 1.5e-3
  weight_decay: 1.0e-6
  lr_step_size: 3
  lr_gamma: 0.9

  teacher_loss_type: soft_ce
  distill_temperature: 1.0
  lambda_teacher: 1.0
  lambda_dssp: 1.0
  require_dssp_labels: true

  use_validation: true
  early_stopping_patience: 20
  checkpoint_every: 10
  log_every_steps: 100
  resume_checkpoint: ""

active_learning:
  strategy: random          # passive learning baseline
  pool_size: 12000          # first 12k training IDs form the candidate pool
  initial_train_size: 2500  # labeled set at round 0
  budget_per_round: 500     # proteins acquired per round
  num_rounds: 15            # rounds 0..15 (round 0 = initial, rounds 1-15 = acquisition)
  seed: 42

wandb:
  # <<< EDIT — set false if not using Weights & Biases
  enabled: true
  # <<< EDIT — your W&B entity (username or team); empty string may still work if logged in
  entity: ""
  project: "pLM_KD"
  # <<< EDIT optional — run name shown in W&B
  name: "aws_al_passive"
  notes: ""
  tags: ["aws", "active_learning", "passive"]

eval:
  batch_size: 48
